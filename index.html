<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FamPay</title>
    
    <!-- PWA / Home Screen Meta Tags -->
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FamPay">
    
    <!-- Link to the physical Manifest file -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon & Icons -->
    <link rel="shortcut icon" href="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://fampay-dtu-cognizance.netlify.app/&size=512">
    <link rel="apple-touch-icon" href="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://fampay-dtu-cognizance.netlify.app/&size=512">

    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background-color: black; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden; /* Prevent body scroll to feel more like an app */
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Layout Fixes */
        #root { height: 100vh; width: 100%; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        
        /* Popup animation */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Handle safe areas for mobile notches */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        /**
         * SERVICE WORKER REGISTRATION
         * Simple and robust registration.
         */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Check if we are on GitHub Pages or local
                const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
                const isSandbox = location.host.includes('usercontent.goog');
                
                if (!isSandbox) {
                    navigator.serviceWorker.register('sw.js')
                        .then(reg => console.log('SW Registered:', reg.scope))
                        .catch(err => console.log('SW Registration failed:', err));
                }
            });
        }
    </script>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
          const [isPopupOpen, setIsPopupOpen] = useState(false);
          const [balance, setBalance] = useState("786.37");
          const [isEditingBalance, setIsEditingBalance] = useState(false);
          const inputRef = useRef(null);

          // Image Assets from GitHub/Discord
          const LOGO_ICON = "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://fampay-dtu-cognizance.netlify.app/&size=512";
          const CAT_BANNER = "https://raw.githubusercontent.com/Armx-123/fam/main/4674375e-ee4e-48df-9648-2d9e8d97188f.jpg";
          const BANK_PROMO = "https://raw.githubusercontent.com/Armx-123/fam/main/83a351ee-43b9-4864-8b7e-265d718cb0f8.jpg";
          const PROFILE_PIC = "https://cdn.discordapp.com/avatars/831419437617643591/f6aa179896d7f2116b58fe6c54c2293a.webp?size=240";

          const recommended = [
            { name: "Rajesh 3si...", color: "bg-red-500", icon: "🔥", badge: "GPay" },
            { name: "Irfan", color: "bg-blue-400", icon: "💧", badge: "PP" },
            { name: "Sukh Baha...", color: "bg-orange-400", icon: "👑", badge: "GPay" },
            { name: "Mr Pravee...", color: "bg-purple-500", icon: "⭐", badge: "PP" },
          ];

          useEffect(() => {
            if (isEditingBalance && inputRef.current) inputRef.current.focus();
          }, [isEditingBalance]);

          useEffect(() => {
            lucide.createIcons();
          });

          const NavItem = ({ iconName, label, active = false }) => (
            <div className={`flex flex-col items-center gap-1 flex-1 cursor-pointer transition-all ${active ? 'text-[#eab308]' : 'text-zinc-500'}`}>
              <div className={`h-10 flex items-center justify-center ${active ? 'scale-110' : 'scale-100'}`}>
                 <i data-lucide={iconName} className="w-[22px] h-[22px]"></i>
              </div>
              <span className={`text-[10px] ${active ? 'font-black' : 'font-bold'}`}>{label}</span>
            </div>
          );

          return (
            <div className="flex flex-col h-full bg-black text-white overflow-hidden select-none relative">
              
              {/* Header */}
              <div className="px-4 py-3 flex items-center gap-3 bg-black safe-top">
                <div className="w-11 h-11 bg-[#222222] rounded-full overflow-hidden border border-white/5 shadow-lg active:scale-90 transition-transform cursor-pointer">
                  <img src={PROFILE_PIC} className="w-full h-full object-cover" alt="Profile" />
                </div>
                <div className="flex-1 bg-[#1a1a1a] rounded-full h-11 flex items-center px-4 gap-3 border border-white/5">
                  <i data-lucide="search" className="text-gray-500 w-5 h-5"></i>
                  <span className="text-gray-500 text-[14px]">Pay any UPI ID</span>
                </div>
                <div className="w-11 h-11 bg-[#1a1a1a] rounded-full flex items-center justify-center border border-white/5 shadow-lg">
                  <i data-lucide="send" className="text-white transform -rotate-12 w-5 h-5"></i>
                </div>
              </div>

              {/* Scrollable Content */}
              <div className="flex-1 overflow-y-auto no-scrollbar pb-32">
                <div className="px-4 mt-2">
                  <div className="relative aspect-square w-full bg-[#161616] rounded-[42px] overflow-hidden border border-white/5 shadow-2xl">
                    <img src={CAT_BANNER} className="absolute inset-0 w-full h-full object-cover" alt="Banner" />
                  </div>
                  <div className="flex justify-center items-center mt-5 gap-1 text-[#42a5f5] text-[13px] font-bold">
                    Get World Cup Themes <i data-lucide="chevron-right" className="w-4 h-4"></i>
                  </div>
                </div>

                {/* Primary Actions Grid */}
                <div className="flex items-center justify-between px-6 mt-8">
                  <div className="flex flex-col items-center gap-2">
                    <div className="w-15 h-15 bg-black border border-white/10 rounded-full flex items-center justify-center shadow-lg relative overflow-hidden active:scale-95 transition-transform">
                      <i data-lucide="scan-line" className="text-white opacity-90 w-6 h-6"></i>
                      <div className="absolute bottom-0 w-full h-1/4 bg-white/5"></div>
                    </div>
                    <div className="bg-[#1a1a1a] px-2.5 py-0.5 rounded text-[9px] text-gray-400 uppercase font-bold tracking-tight">Your QR</div>
                  </div>
                  <button onClick={() => setIsPopupOpen(true)} className="flex-1 mx-4 h-16 bg-[#0c0c0c] border border-white/10 rounded-full flex items-center justify-center gap-3 active:scale-95 transition-transform shadow-[inset_0_1px_1px_rgba(255,255,255,0.05)]">
                    <i data-lucide="eye" className="text-white opacity-80 w-5 h-5"></i>
                    <span className="text-[14px] font-bold tracking-tight">Check Balance</span>
                  </button>
                  <div className="flex flex-col items-center gap-2">
                    <div className="w-15 h-15 bg-black border border-white/10 rounded-full flex items-center justify-center shadow-lg relative overflow-hidden active:scale-95 transition-transform">
                      <div className="border-2 border-white/40 p-1 rounded"><i data-lucide="plus" className="w-4 h-4"></i></div>
                      <div className="absolute bottom-0 w-full h-1/4 bg-white/5"></div>
                    </div>
                    <div className="bg-[#1a1a1a] px-2.5 py-0.5 rounded text-[9px] text-gray-400 uppercase font-bold tracking-tight">Add Money</div>
                  </div>
                </div>

                {/* Secondary Actions Row */}
                <div className="flex items-center justify-between px-6 mt-6">
                  <div className="flex flex-col items-center gap-2">
                    <div className="w-15 h-15 bg-black border border-white/10 rounded-full flex items-center justify-center relative overflow-hidden active:scale-95 transition-transform">
                      <div className="w-full h-full bg-gradient-to-br from-transparent to-white/5"></div>
                      <div className="absolute bottom-0 w-full h-1/4 bg-white/5"></div>
                    </div>
                    <div className="bg-[#1a1a1a] px-3 py-0.5 rounded text-[9px] text-gray-400 uppercase font-bold tracking-tight">DigiGold</div>
                  </div>
                  <div className="flex-1 mx-4 h-16 bg-[#0c0c0c] border border-white/10 rounded-full flex items-center justify-center active:scale-95 transition-transform">
                    <span className="text-[14px] font-bold text-gray-200">Vouchers</span>
                  </div>
                  <div className="flex flex-col items-center gap-2">
                    <div className="w-15 h-15 bg-black border border-white/10 rounded-full flex items-center justify-center relative overflow-hidden active:scale-95 transition-transform">
                      <div className="w-full h-full bg-gradient-to-bl from-transparent to-white/5"></div>
                      <div className="absolute bottom-0 w-full h-1/4 bg-white/5"></div>
                    </div>
                    <div className="bg-[#1a1a1a] px-3 py-0.5 rounded text-[9px] text-gray-400 uppercase font-bold tracking-tight">Keeper</div>
                  </div>
                </div>

                {/* Recommended Contacts */}
                <div className="mt-10">
                  <div className="px-6 mb-5"><h2 className="text-gray-500 text-[14px] font-bold tracking-tight">Recommended</h2></div>
                  <div className="flex gap-4 px-6 overflow-x-auto no-scrollbar pb-10">
                    {recommended.map((person, i) => (
                      <div key={i} className="flex flex-col items-center gap-3 flex-shrink-0 w-20">
                        <div className="relative group">
                          <div className="w-18 h-18 rounded-full bg-zinc-900 border border-white/10 flex items-center justify-center overflow-hidden active:scale-90 transition-transform">
                            <i data-lucide="user" className="text-white/5 w-10 h-10"></i>
                            <div className={`absolute top-0 left-1/2 -translate-x-1/2 w-10 h-10 rounded-full ${person.color} flex items-center justify-center border-4 border-[#000000]`}>
                              <span className="text-[12px]">{person.icon}</span>
                            </div>
                          </div>
                          <div className="absolute bottom-0 right-0 w-7 h-7 rounded-full bg-white flex items-center justify-center border-[3px] border-black shadow-lg">
                            <div className={`w-5 h-5 rounded-full ${person.badge === 'GPay' ? 'bg-blue-500' : 'bg-indigo-600'} flex items-center justify-center`}>
                               <span className="text-[8px] font-black text-white">{person.badge === 'GPay' ? 'G' : 'P'}</span>
                            </div>
                          </div>
                        </div>
                        <span className="text-[11px] text-gray-400 font-bold text-center w-full truncate">{person.name}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Fixed Bottom Navigation */}
              <div className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-white/5 px-2 pb-8 pt-2 flex justify-around items-center z-40 safe-bottom">
                <NavItem iconName="landmark" label="Bank" />
                <NavItem iconName="history" label="Wallet" />
                <NavItem iconName="smartphone" label="Pay" active />
                <NavItem iconName="trophy" label="Rewards" />
                <NavItem iconName="layout-grid" label="Keeper" />
              </div>

              {/* Check Balance Popup */}
              {isPopupOpen && (
                <div className="fixed inset-0 z-50 flex flex-col justify-end">
                  <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={() => { setIsPopupOpen(false); setIsEditingBalance(false); }}></div>
                  <div className="relative bg-[#0d0d0d] rounded-t-[44px] px-6 pt-7 pb-10 shadow-2xl animate-slide-up">
                    <div className="flex items-center mb-9">
                      <button onClick={() => { setIsPopupOpen(false); setIsEditingBalance(false); }} className="mr-4 active:scale-75 transition-transform"><i data-lucide="chevron-left" className="w-8 h-8"></i></button>
                      <h2 className="text-2xl font-black tracking-tight">Check Balance</h2>
                    </div>
                    
                    <div className="flex items-center justify-between mb-10 px-1">
                      <div className="flex items-center gap-4">
                        <div className="w-13 h-13 bg-[#1a1a1a] rounded-2xl flex items-center justify-center shadow-xl overflow-hidden border border-white/5 p-2">
                           <img src={LOGO_ICON} className="w-full h-full object-cover scale-110" alt="Logo" />
                        </div>
                        <span className="text-lg font-bold text-gray-200 tracking-tight">Wallet balance</span>
                      </div>
                      <div className="flex items-center gap-1 text-2xl font-black">
                        <span className="text-gray-500">₹</span>
                        {isEditingBalance ? (
                          <input 
                            ref={inputRef} 
                            type="text" 
                            inputMode="decimal"
                            value={balance} 
                            onChange={(e) => setBalance(e.target.value)} 
                            onBlur={() => setIsEditingBalance(false)} 
                            onKeyDown={(e) => e.key === 'Enter' && setIsEditingBalance(false)}
                            className="bg-transparent border-b-2 border-blue-600 outline-none text-white w-28 text-right px-1" 
                          />
                        ) : (
                          <div 
                            onClick={() => setIsEditingBalance(true)} 
                            className="text-white min-w-[80px] text-right"
                          >
                            {balance}
                          </div>
                        )}
                      </div>
                    </div>
                    
                    <div className="w-full rounded-[30px] overflow-hidden border border-white/5 shadow-2xl bg-zinc-900 active:scale-[0.98] transition-transform">
                      <img src={BANK_PROMO} className="w-full h-auto object-cover" alt="Promo" />
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
